<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neome Poster</title>
    <style>
        body {
            width: 320px;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
            text-align: center;
        }

        h1 {
            color: #1d9bf0;
            margin-bottom: 20px;
        }

        .id-box {
            background: #1f2937;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            word-break: break-all;
            font-family: monospace;
            font-size: 13px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #1d9bf0;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

            button:hover {
                background: #1a8cd8;
            }

        .copy-btn {
            background: #f59e0b;
        }

            .copy-btn:hover {
                background: #d97706;
            }

        .refresh-btn {
            background: #4ade80;
        }

            .refresh-btn:hover {
                background: #22c55e;
            }

        .status {
            margin-top: 10px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <h1>Neome Poster</h1>

    <div>
        <strong>Client ID:</strong>
        <div id="clientId" class="id-box">Loading...</div>
    </div>

    <button id="copyBtn" class="copy-btn">📋 Copy Client ID</button>
    <button id="refreshBtn" class="refresh-btn">🔄 Refresh Client ID</button>
    <button id="testPostBtn">Test X Post</button>

    <div id="status" class="status"></div>

    <script src="popup.js"></script>
</body>
</html>
